<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Bento Layout</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; }
        
        body {
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: 150px;
            gap: 15px;
            max-width: 800px;
            width: 100%;
        }

        .item {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.6s forwards;
        }

        .item:hover {
            border-color: var(--accent);
            transform: scale(1.03);
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.1);
        }

        /* Bento Grid Specific Spacing */
        .item-1 { grid-column: span 2; grid-row: span 2; background: linear-gradient(45deg, #1e293b, #334155); }
        .item-2 { grid-column: span 1; grid-row: span 1; }
        .item-3 { grid-column: span 1; grid-row: span 2; }
        .item-4 { grid-column: span 2; grid-row: span 1; }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Staggered animation delays */
        .item:nth-child(1) { animation-delay: 0.1s; }
        .item:nth-child(2) { animation-delay: 0.2s; }
        .item:nth-child(3) { animation-delay: 0.3s; }
        .item:nth-child(4) { animation-delay: 0.4s; }

        h2 { color: var(--accent); margin-bottom: 5px; }
        p { font-size: 0.9rem; opacity: 0.7; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <div class="item item-1">
            <h2>Welcome Back</h2>
            <p>This is a featured bento box card.</p>
        </div>
        <div class="item item-2">
            <h3>85%</h3>
            <p>Progress</p>
        </div>
        <div class="item item-3">
            <h3>Projects</h3>
            <p>View all work</p>
        </div>
        <div class="item item-4">
            <h3>Connect</h3>
            <p>Click to get in touch</p>
        </div>
    </div>

</body>
</html>
