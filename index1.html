<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Interactive Experience</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transform: translateY(0);
            transition: all 0.3s ease;
            cursor: pointer;
            max-width: 400px;
        }

        .glass-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255, 255, 255, 0.2);
        }

        h1 { font-size: 2.5rem; margin-bottom: 15px; letter-spacing: 2px; }
        p { line-height: 1.6; opacity: 0.9; }

        .btn {
            margin-top: 25px;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #e73c7e;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

    <div class="glass-card" id="card">
        <h1>AURA</h1>
        <p>Welcome to a space where design meets motion. Move your mouse to see the world shift around you.</p>
        <button class="btn" onclick="changeColor()">Interact</button>
    </div>

    <script>
        // Interactive element: Tilt effect logic
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        function changeColor() {
            alert("Thanks for clicking! You can customize this to open a menu or trigger an animation.");
        }
    </script>
</body>
</html>
